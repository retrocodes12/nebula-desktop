name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows installer + portable
        run: npm run dist

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v1.9.0 -y --cleanup-tag 2>/dev/null || true
          gh release create v1.9.0 dist/*.exe \
            --title "Nebula (Windows) v1.9.0" \
            --notes "New: series now have a season and episode picker — opening a series shows its seasons and episodes instead of jumping straight to streams; movies are unchanged. Includes watch parties, Mini player and Picture-in-picture. Setup is the installer; Portable runs without installing. Unsigned, so Windows SmartScreen may warn (More info -> Run anyway)."
